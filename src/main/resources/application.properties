# Server
server.port=8080

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/ridebook
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=RideBookSecretKey2024ForJWTTokenGenerationAndValidation256BitsLong!
app.jwt.expiration-ms=86400000

# Ride Configuration
app.ride.search-radius-km=5.0
app.ride.driver-timeout-seconds=15
app.ride.base-fare=25.0
app.ride.per-km-rate=10.0
app.ride.per-min-rate=2.0
app.ride.surge-multiplier=1.0
